name: Release

on:
  push:
    branches: [main]

# 同じブランチで release workflow が二重起動して publish 競合するのを防ぐ
concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # changesets/action が "Version Packages" PR を作成・更新するために必要
      pull-requests: write  # 同 PR への push / label
      id-token: write       # npm Trusted Publishing (auto-provenance) + mcp-publisher GitHub OIDC
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          # changesets/action needs the full history to diff against the release base
          fetch-depth: 0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: 20
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      # npm Trusted Publishing requires npm CLI 11.5.1+; setup-node@v4 still
      # ships with npm 10.x for Node 20, so upgrade explicitly.
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm run build
      - run: npm test

      - name: Create release PR or publish to npm
        id: changesets
        uses: changesets/action@e87c8ed249971350e47fab7515075f44eb134e5b  # v1.7.0
        with:
          # .changeset/*.md があれば "Version Packages" PR を作成/更新、無ければ publish
          publish: npx changeset publish
          commit: 'chore: release packages'
          title: 'chore: release packages'
        env:
          # 既定の GITHUB_TOKEN だと bot が作る "release packages" PR で
          # ci.yml の pull_request トリガーが fire しない (anti-recursion)。
          # 必須 status check が通らずマージ詰まりするため PAT で上書きする。
          GITHUB_TOKEN: ${{ secrets.CHANGESETS_PAT }}
          # No NODE_AUTH_TOKEN: npm Trusted Publishing exchanges the GitHub
          # OIDC token (id-token: write) for a short-lived publish token.
          # No NPM_CONFIG_PROVENANCE: provenance is auto-attested under
          # Trusted Publishing on npm CLI 11.5.1+.

      # release PR は changeset から決定論的に生成される (version bump + CHANGELOG)
      # 元の changeset を含む PR は既に approve 済みなので、ここでは bot identity
      # (github-actions) で auto approve して branch protection の 1-review 要件を満たす。
      # 作者 (CHANGESETS_PAT = user PAT) と異なる identity でないと self-review 拒否される。
      - name: Auto-approve release PR
        if: steps.changesets.outputs.pullRequestNumber != ''
        run: |
          gh pr review --approve "${PR_NUMBER}" \
            --body "Auto-approved: deterministic version/CHANGELOG bump from changesets."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.changesets.outputs.pullRequestNumber }}

      # release PR が作成/更新された時、CI 通過後に自動 squash merge するよう設定。
      # branch protection の required status checks + 1 approval が揃ってから merge される。
      - name: Enable auto-merge for release PR
        if: steps.changesets.outputs.pullRequestNumber != ''
        run: gh pr merge --auto --squash "${PR_NUMBER}"
        env:
          GH_TOKEN: ${{ secrets.CHANGESETS_PAT }}
          PR_NUMBER: ${{ steps.changesets.outputs.pullRequestNumber }}

      # 以下は changesets が実際に publish したとき (Version Packages PR の merge 時) のみ走る
      - name: Sync version into server.json
        if: steps.changesets.outputs.published == 'true'
        run: |
          VERSION=$(jq -r '.version' package.json)
          jq --arg v "$VERSION" '.version = $v | .packages[0].version = $v' server.json > tmp
          mv tmp server.json

      - name: Install mcp-publisher
        if: steps.changesets.outputs.published == 'true'
        env:
          # Pin the version + SHA so a compromised "latest" cannot inject a
          # rogue binary into the publish path. Bump both fields together when
          # upgrading; the SHA is published in registry_<ver>_checksums.txt.
          MCP_PUBLISHER_VERSION: 'v1.7.6'
          MCP_PUBLISHER_SHA256: 'bcc96ca630cae4cf503b4550bd4a17462d42ad4819273bee56f4385bb059ddee'
        run: |
          curl -fsSL -o mcp-publisher.tar.gz \
            "https://github.com/modelcontextprotocol/registry/releases/download/${MCP_PUBLISHER_VERSION}/mcp-publisher_linux_amd64.tar.gz"
          echo "${MCP_PUBLISHER_SHA256}  mcp-publisher.tar.gz" | sha256sum -c -
          tar xz -f mcp-publisher.tar.gz mcp-publisher
          chmod +x mcp-publisher

      - name: Publish to MCP Registry
        if: steps.changesets.outputs.published == 'true'
        run: |
          ./mcp-publisher login github-oidc
          ./mcp-publisher publish
