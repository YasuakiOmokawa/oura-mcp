name: Update API references

on:
  schedule:
    - cron: '0 4 * * 1'  # 月曜 04:00 UTC = 13:00 JST
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run update:docs
      - uses: peter-evans/create-pull-request@c5a7806660adbe173f04e3e038b0ccdcd758773c  # v6
        with:
          branch: ci/update-references
          title: 'chore: update Oura API references'
          body: 'Automated update from latest Oura OpenAPI schema.'
          commit-message: 'chore: update API references'
